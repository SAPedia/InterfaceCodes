name: Update Tailwind

on:
    schedule:
        - cron: '17 3 * * 1' # Monday 11:17 CST
    workflow_dispatch:

permissions:
    contents: write

jobs:
    update:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0
            - uses: pnpm/action-setup@v6
              with:
                  version: 11.8.0
            - name: Set Node Version
              uses: actions/setup-node@v6
              with:
                  node-version: 24.x
                  cache: pnpm
            - name: Install dependencies
              run: pnpm install --frozen-lockfile
            - name: Update TailwindCSS
              run: pnpm tsx scripts/auto/updateTailwind.ts
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
