<!doctype html>
<html
    class="client-js skin-theme-clientpref-day citizen-feature-autohide-navigation-clientpref-1 citizen-feature-image-dimming-clientpref-0 citizen-feature-pure-black-clientpref-0 citizen-feature-custom-font-size-clientpref-standard citizen-feature-custom-width-clientpref-wide citizen-feature-performance-mode-clientpref-0 citizen-header-position-left ve-not-available citizen-animations-ready"
    lang="zh"
    dir="ltr"
>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>SAPedia 开发</title>
    </head>
    <body
        class="mediawiki ltr sitedir-ltr mw-hide-empty-elt ns-118 ns-subject mw-editable page-Draft_沙盒 rootpage-Draft_沙盒 skin-citizen action-view skin--responsive"
    >
        <header class="mw-header citizen-header">
            <div class="citizen-header__logo">
                <a
                    href="/"
                    class="mw-logo citizen-cdx-button--size-large cdx-button cdx-button--fake-button cdx-button--fake-button--enabled cdx-button--icon-only cdx-button--weight-quiet"
                    title="访问首页"
                >
                    <img
                        class="mw-logo-icon"
                        src="./assets/Logo.svg"
                        alt=""
                        aria-hidden="true"
                        height="32"
                        width="32"
                    />
                    <span class="citizen-ui-icon mw-ui-icon-home mw-ui-icon-wikimedia-home"></span>
                </a>
            </div>
            <div class="citizen-search citizen-header__item citizen-dropdown">
                <details id="citizen-search-details" class="citizen-dropdown-details">
                    <summary
                        class="citizen-dropdown-summary citizen-cdx-button--size-large cdx-button cdx-button--fake-button cdx-button--fake-button--enabled cdx-button--icon-only cdx-button--weight-quiet"
                        title="打开/关闭搜索 [/]"
                        aria-details="citizen-search__card"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="20"
                            height="20"
                            viewBox="0 0 20 20"
                            aria-hidden="true"
                        >
                            <circle
                                cx="8"
                                cy="8"
                                r="6"
                                fill="none"
                                stroke="currentcolor"
                                stroke-width="2"
                            />
                            <line
                                class="citizen-icon-search__handle"
                                x1="12.5"
                                y1="12.5"
                                x2="18"
                                y2="18"
                                stroke="currentcolor"
                                stroke-width="2"
                                stroke-linecap="round"
                            />
                            <line
                                class="citizen-icon-search__close"
                                x1="3.6"
                                y1="3.6"
                                x2="16.4"
                                y2="16.4"
                                stroke="currentcolor"
                                stroke-width="2"
                                stroke-linecap="round"
                            />
                            <line
                                class="citizen-icon-search__close"
                                x1="16.4"
                                y1="3.6"
                                x2="3.6"
                                y2="16.4"
                                stroke="currentcolor"
                                stroke-width="2"
                                stroke-linecap="round"
                            />
                        </svg>
                        <span>打开/关闭搜索</span>
                    </summary>
                </details>
            </div>
            <div class="citizen-drawer citizen-header__item citizen-dropdown">
                <details class="citizen-dropdown-details">
                    <summary
                        class="citizen-dropdown-summary citizen-cdx-button--size-large cdx-button cdx-button--fake-button cdx-button--fake-button--enabled cdx-button--icon-only cdx-button--weight-quiet"
                        title="打开/关闭菜单"
                        aria-details="citizen-drawer__card"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            width="20"
                            height="20"
                            viewBox="0 0 20 20"
                            aria-hidden="true"
                        >
                            <rect x="1" y="3" width="18" height="2" fill="currentcolor" rx="1" />
                            <rect x="1" y="9" width="18" height="2" fill="currentcolor" rx="1" />
                            <rect x="1" y="15" width="18" height="2" fill="currentcolor" rx="1" />
                        </svg>
                        <span>打开/关闭菜单</span>
                    </summary>
                </details>
            </div>
            <div class="citizen-header__inner">
                <div class="citizen-header__start"></div>
                <div class="citizen-header__end">
                    <div class="citizen-preferences-dropdown citizen-header__item citizen-dropdown">
                        <details id="citizen-preferences-details" class="citizen-dropdown-details">
                            <summary
                                class="citizen-dropdown-summary citizen-cdx-button--size-large cdx-button cdx-button--fake-button cdx-button--fake-button--enabled cdx-button--weight-quiet cdx-button--icon-only"
                                title="打开/关闭外观设置菜单"
                                aria-details="citizen-preferences-dropdown__card"
                            >
                                <svg
                                    xmlns="http://www.w3.org/2000/svg"
                                    width="20"
                                    height="20"
                                    viewBox="0 0 20 20"
                                    aria-hidden="true"
                                >
                                    <path
                                        d="M17.4 10c0-.5 0-1-.1-1.5l2.1-1.6-2-3.5-2.5.8c-.7-.6-1.5-1-2.3-1.3L12.1 1H8.9l-.5 2.4c-.8.3-1.5.7-2.3 1.3l-2.5-.8-2 3.5 2.1 1.6c-.1.5-.1 1-.1 1.5s0 1 .1 1.5l-2.1 1.6 2 3.5 2.5-.8c.7.6 1.5 1 2.3 1.3l.5 2.4h3.2l.5-2.4c.8-.3 1.5-.7 2.3-1.3l2.5.8 2-3.5-2.1-1.6c.1-.5.1-1 .1-1.5zM10 14.5a4.5 4.5 0 110-9 4.5 4.5 0 010 9z"
                                    />
                                </svg>
                                <span>打开/关闭外观设置菜单</span>
                            </summary>
                        </details>
                        <div id="citizen-preferences-dropdown__card" class="citizen-menu__card">
                            <div class="citizen-menu__card-content">
                                <div id="citizen-preferences-content" class="citizen-preferences">
                                    <div
                                        class="citizen-preferences-skeleton"
                                        role="status"
                                        aria-busy="true"
                                        aria-live="polite"
                                    >
                                        <div class="citizen-preferences-skeleton__heading"></div>
                                        <div class="citizen-preferences-skeleton__row">
                                            <div class="citizen-preferences-skeleton__label"></div>
                                            <div
                                                class="citizen-preferences-skeleton__description"
                                            ></div>
                                        </div>
                                        <div class="citizen-preferences-skeleton__row">
                                            <div class="citizen-preferences-skeleton__label"></div>
                                            <div
                                                class="citizen-preferences-skeleton__description"
                                            ></div>
                                        </div>
                                        <div class="citizen-preferences-skeleton__row">
                                            <div class="citizen-preferences-skeleton__label"></div>
                                            <div
                                                class="citizen-preferences-skeleton__description"
                                            ></div>
                                        </div>
                                        <div class="citizen-preferences-skeleton__heading"></div>
                                        <div class="citizen-preferences-skeleton__row">
                                            <div class="citizen-preferences-skeleton__label"></div>
                                            <div
                                                class="citizen-preferences-skeleton__description"
                                            ></div>
                                        </div>
                                        <div class="citizen-preferences-skeleton__row">
                                            <div class="citizen-preferences-skeleton__label"></div>
                                            <div
                                                class="citizen-preferences-skeleton__description"
                                            ></div>
                                        </div>
                                    </div>
                                    <div class="citizen-preferences-error" role="alert" hidden="">
                                        <p class="citizen-preferences-error__message">
                                            无法加载偏好设置。请检查您的网络连接并重试。
                                        </p>
                                        <button
                                            class="cdx-button citizen-preferences-error__retry"
                                            type="button"
                                        >
                                            重试
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>
        <div class="citizen-page-container">
            <div class="citizen-sitenotice-container"><div id="siteNotice"></div></div>
            <main class="mw-body" id="content">
                <div id="dev-app"></div>
            </main>
        </div>
        <script type="module" src="./main.tsx"></script>
    </body>
</html>
